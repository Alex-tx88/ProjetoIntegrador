<div class="page">

  </div>

  <div class="graficos-grid">

    <div class="grafico-card">
      <h3>Entregas por Período (últimos 7 dias)</h3>
      <canvas #chartCanvas></canvas>
    </div>

    <div class="grafico-card">
      <h3>Status das Entregas</h3>
      <canvas #chartCanvas></canvas>
    </div>

    <div class="grafico-card wide">
      <h3>Ranking de Moradores (Top 5)</h3>
      <canvas #chartCanvas></canvas>
    </div>

    <div class="grafico-card">
      <h3>Serviços Mais Agendados</h3>
      <canvas #chartCanvas></canvas>
    </div>

    <div class="grafico-card">
      <h3>Chaves Mais Emprestadas</h3>
      <canvas #chartCanvas></canvas>
    </div>

    <div class="grafico-card">
      <h3>Entregas por Porteiro</h3>
      <canvas #chartCanvas></canvas>
    </div>

  </div>
</div>
