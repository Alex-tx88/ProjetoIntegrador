apiVersion: apps/v1
kind: Deployment
metadata:
  name: porteiro-digital-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: porteiro-digital
  template:
    metadata:
      labels:
        app: porteiro-digital
    spec:
      containers:
      - name: porteiro-digital-app
        image: alextx88/porteiro_digital:v2
        ports:
        - containerPort: 80